{% load static %}
<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous" />
    
    <!-- Custom CSS -->
    <link href="{% static 'pages/app.css' %}" rel="stylesheet" />

    <title>{% block title %}Online Store{% endblock %}</title>
</head>

<body>
    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary py-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Online Store</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link active" href="{% url 'home' %}">Home</a>
                    <a class="nav-link active" href="{% url 'about' %}">About</a>
                    <a class="nav-link active" href="{% url 'contact' %}">Contact</a>
                    <a class="nav-link active" href="{% url 'products' %}">Products</a>
                    <a class="nav-link active" href="{% url 'form' %}">Create Product</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Masthead / Hero -->
    <header class="masthead bg-primary text-white text-center py-4">
        <div class="container d-flex align-items-center flex-column">
            <h2>{% block header_title %}A Django EAFIT App{% endblock %}</h2>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container my-4">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Footer -->
    {% block footer %}
    <footer class="bg-secondary text-white py-4">
        <div class="container text-center">
            <small>
                Copyright - 
                <a class="text-reset fw-bold text-decoration-none" target="_blank"
                    href="https://twitter.com/danielgarax">Daniel Correa</a>
            </small>
        </div>
    </footer>
    {% endblock %}

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>

</html>
